# ============================================================
# SMC rig MQTT broker - TEST configuration
# ------------------------------------------------------------
# This is a TEST config: anonymous access, no TLS. Harden
# (passwords / TLS / ACLs) before any production / networked use.
#
# Run with:
#   "C:\Program Files\Mosquitto\mosquitto.exe" -v -c C:\VueOneMapper\MQTT\mosquitto.conf
# (-v = verbose: prints every connect / subscribe / publish so you
#  can watch the PLC connect live.)
# ============================================================

# Listen on all interfaces so the M262 (192.168.1.10) can reach the
# broker. Default mosquitto 2.x binds to localhost only -> the PLC's
# connect is refused, which is the "actively refused" error you hit.
listener 1883 0.0.0.0

# TLS listener on 8883. Required by EAE 24.1's MQTT_CONNECTION runtime
# which defaults to ValidateCert='Server certificate and hostname' and
# REJECTS plain mqtt:// (ReturnCode=100). The Mapper's MqttBrokerUrl
# now points at mqtts://127.0.0.1:8883 against this listener; the
# embedded MqttPub inside each CAT binds to the same ConnectionID.
# Self-signed cert generated by openssl into C:\VueOneMapper\MQTT\certs\.
listener 8883 0.0.0.0
certfile C:\VueOneMapper\MQTT\certs\server.crt
keyfile  C:\VueOneMapper\MQTT\certs\server.key
cafile   C:\VueOneMapper\MQTT\certs\ca.crt
require_certificate false
tls_version tlsv1.2

# TEST ONLY: allow clients with no username/password. Replace with a
# password_file + per-topic ACLs before production.
allow_anonymous true

# Durable broker state. QoS1 messages queued for an offline durable
# subscriber (the logger, client-id smc_logger) and retained messages
# survive a broker restart. This is the broker half of the
# end-to-end no-loss buffer (the PLC half is QueueDepth on
# MQTT_CONNECTION).
persistence true
persistence_location C:\VueOneMapper\MQTT\data\

# Log to BOTH the console (so -v shows startup + connects live; the
# window will not look "stuck") AND a file for later inspection.
log_dest stdout
log_dest file C:\VueOneMapper\MQTT\mosquitto.log
log_type all
log_timestamp true

# Allow a deep queue for the durable logger session so a long logger
# outage does not drop the backlog the broker is holding for it.
max_queued_messages 100000
