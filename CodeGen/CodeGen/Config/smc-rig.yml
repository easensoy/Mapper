# SMC rig catalog — facts the generator reads instead of hardcoding them in C#.

# Process FB state_table slots. Each must sit ABOVE the component id space (0..16) so it never
# collides with a sensor/actuator id; ValidateProcessIdInvariant throws otherwise. The
# Assembly->Disassembly handshake rides assembly as a sentinel, so the stamp and the WAIT share it.
processIds:
  feedStation: 10
  assembly: 17
  disassembly: 18

# state_table slot the UR3e stamps on its ring reports. Its M262 registry id collides on M580 with
# the Assembly station, so it needs a slot free on both PLCs; 19 is the only one.
robotActuatorId: 19

# BX1 cover P&P actuators are Mapper-synthesized (no Control.xml component), so their state_table
# ids are fixed here rather than resolved from the registry. Recipes reference them by name.
coverActuatorIds:
  coverpnp_hr: 14
  coverpnp_vr: 15
  coverpnp_gripper: 16

# Real M262 proximity sensors the digital twin does not model; the rig wires them to fixed DI
# channels. id is the shared state_table slot — it must be free on every PLC whose ring carries
# the report. PartAtAssembly id 3 is free on both the M262 and M580 state_tables.
synthSensors:
  - name: PartAtAssembly
    pin: DI08
    id: 3

# Ordered M262 components spliced onto the M580 ring at the Disassembly seam when the cross-PLC
# discharge is active: Ejector/Robot commands out, PartAtAssembly report back in. Order matters.
crossRingSegment:
  - Ejector
  - Robot
  - PartAtAssembly

# Part-presence interlocks: before each Assembly pick, the recipe WAITs for the sensor to report
# "present". Polarity is physical (not in Control.xml), so it lives here: bearing/shaft are active-low
# (present = 0), the top-cover sensor is active-high (present = 1). block = the recipes.yml block the
# gate sits before. Bearing/shaft ride the M580 Assembly ring already; the cover sensor also gets a ring
# splice, and its state_table id is COMPUTED (a free Assembly-ring slot), so it is model-independent.
sensorInterlocks:
  - block: bearing
    sensor: BearingSensor
    presentState: 0
  - block: shaft
    sensor: ShaftSensor
    presentState: 0
# NO coverPlace gate: the rig has NO independent top-cover-present input. The coupler input word exposes only
# bit0/1 (Hr athome/atwork), bit2/3 (Vr athome/atwork) and bit5, and bit5 (CoverPnpSensor) is ALREADY wired to
# the cover gripper's atwork -- TopCoverSenosr.Input is an ALIAS of that same bit. So it only asserts when
# something is at the gripper face, never for a cover merely sitting in the magazine, which makes a PRE-PICK
# WAIT(present) unsatisfiable: it hangs until the cover is physically taken out and put back (that transient
# latches the sensor at 1, and Sensor_Bool only republishes on a flip, so it then stays 1 for the whole run).
# To restore a real cover interlock, EITHER wire a dedicated cover-present DI to a spare coupler input (bit4/6/7
# are free) and unpack it in PLC_RW_BX1, OR re-purpose this as a POST-grip confirmation ("did we actually pick a
# cover?"), which is what bit5 genuinely means. Bearing/shaft keep their gates -- they have real dedicated sensors.

# M262 DI/DO channels the .hcf MUST bind when the cross-PLC discharge tail is active, else the
# ejector/robot never actuate. The parity validator checks each is bound and non-blank.
dischargeChannels:
  - channel: DI08
    meaning: PartAtAssembly.Input
  - channel: DO03
    meaning: Ejector.OutputToWork
  - channel: DO04
    meaning: Robot.RobotCommands_StartTask
  - channel: DI10
    meaning: Robot.RobotStatus_Task_Complete
