# Deployment-target device network facts for the SMC Demonstrator.
m262:
  targetIp: 192.168.1.10
  subnetAddress: 192.168.1.0
  subnetMask: 255.255.255.0
  gateway: 192.168.1.254
m580:
  targetIp: 192.168.1.20
bx1:
  targetIp: 192.168.1.151
  hostIp: 192.168.1.209
# Revolution Pi (Soft_dPAC) — used only when the Feed station targets RevPi instead of M262.
# targetIp = the softdpac runtime; hostIp = the RevPi NIC (from Jyotsna's RevPi reference).
revPi:
  targetIp: 192.168.1.6
  hostIp: 192.168.1.2
defaultNetwork:
  subnetAddress: 192.168.0.0
  subnetMask: 255.255.255.0
  gateway: 192.168.0.254
